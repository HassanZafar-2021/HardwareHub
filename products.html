<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore a wide range of hardware supplies and tools at A&R Hardware Store, including paintbrushes, hammers, drills, and more."
    />
    <title>A&R Hardware Store - Products</title>
    <link rel="stylesheet" href="./style/styles.css" />
  </head>

  <body>
    <header id="header">
      <div class="container">
        <div class="logo">
          <img
            src="./images/mylogo.png"
            alt="A&R Hardware Logo"
            width="100"
            height="100"
          />
        </div>
        <button onClick="toggleTheme()" id="theme-toggle-button">
          <img
            src="./images/lightMode.svg"
            alt="Toggle light or dark theme"
            width="30"
            height="30"
            id="theme-icon"
          />
        </button>
        <div role="banner">
          <h1 id="main-title">A&R Hardware</h1>
          <p class="main-paragraph">
            <span>🛑 One-Stop Shop for Hardware Tools & Repairs (Cash Only) 🧰</span>
          </p>
        </div>
        <nav id="navbar" aria-label="Main navigation">
          <ul>
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="about.html">📓 About Us</a></li>
            <li><a href="products.html">🔨 Products</a></li>
            <li><a href="reviews.html">⭐ Reviews</a></li>
            <li><a href="contact.html">📝 Contact Us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section aria-labelledby="popular">
        <h2 id="popular">Most Popular Products</h2>

        <section class="products" id="cardContainer" aria-label="Product cards">
          <!-- Dynamic product cards inserted via JS -->
        </section>

        <div class="chat-bubble" role="note" aria-label="Product notice">
          ⬇️
          <div class="chat-extra">
            <span class="highlight">and many more!</span>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 A&R Hardware Supply. All rights reserved.</p>
    </footer>

    <script src="./js/theme.js"></script>
    <script src="./js/products.js"></script>
  </body>
</html>
